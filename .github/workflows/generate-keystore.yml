name: Generate Keystore (ONE-TIME SETUP — delete after use)
on:
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias omt-pulse \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=OMT Pulse, OU=IntelAfri, O=IntelAfriSouthAfrica, L=Johannesburg, S=Gauteng, C=ZA" \
            -storepass omtpulse2024 \
            -keypass omtpulse2024
      - name: Save base64 to file
        run: |
          base64 -w 0 release.keystore > keystore-base64.txt
          echo "" >> keystore-base64.txt
          echo "KEYSTORE_PASSWORD=omtpulse2024" >> keystore-base64.txt
          echo "KEY_ALIAS=omt-pulse" >> keystore-base64.txt
          echo "KEY_PASSWORD=omtpulse2024" >> keystore-base64.txt
      - uses: actions/upload-artifact@v4
        with:
          name: keystore-secrets
          path: keystore-base64.txt
